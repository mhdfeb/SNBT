<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="repTitle repDesc">
  <title id="repTitle">Ringkasan strategi belajar mingguan</title>
  <desc id="repDesc">Visual laporan berisi prioritas belajar TPS, literasi, dan matematika untuk 7 hari.</desc>
  <rect width="1200" height="380" rx="36" fill="#0F172A"/>
  <rect x="40" y="52" width="240" height="276" rx="24" fill="#1D4ED8"/>
  <rect x="300" y="52" width="240" height="276" rx="24" fill="#E11D48"/>
  <rect x="560" y="52" width="240" height="276" rx="24" fill="#059669"/>
  <rect x="820" y="52" width="340" height="276" rx="24" fill="#1E293B"/>
  <text x="64" y="94" fill="white" font-size="20" font-family="Inter, Arial" font-weight="700">TPS</text>
  <text x="64" y="124" fill="#DBEAFE" font-size="15" font-family="Inter, Arial">Fokus 3 sesi x 40 menit</text>
  <text x="324" y="94" fill="white" font-size="20" font-family="Inter, Arial" font-weight="700">Literasi</text>
  <text x="324" y="124" fill="#FFE4E6" font-size="15" font-family="Inter, Arial">Latihan inferensi harian</text>
  <text x="584" y="94" fill="white" font-size="20" font-family="Inter, Arial" font-weight="700">Matematika</text>
  <text x="584" y="124" fill="#D1FAE5" font-size="15" font-family="Inter, Arial">Drill 20 soal campuran</text>
  <text x="852" y="92" fill="#94A3B8" font-size="14" font-family="Inter, Arial" font-weight="700">Plan 7 Hari</text>
  <text x="852" y="124" fill="#E2E8F0" font-size="14" font-family="Inter, Arial">Senin: TPS pola</text>
  <text x="852" y="150" fill="#E2E8F0" font-size="14" font-family="Inter, Arial">Selasa: Literasi kritik</text>
  <text x="852" y="176" fill="#E2E8F0" font-size="14" font-family="Inter, Arial">Rabu: Matematika numerik</text>
  <text x="852" y="202" fill="#E2E8F0" font-size="14" font-family="Inter, Arial">Kamis: TPS kuantitatif</text>
  <text x="852" y="228" fill="#E2E8F0" font-size="14" font-family="Inter, Arial">Jumat: Literasi teks panjang</text>
  <text x="852" y="254" fill="#E2E8F0" font-size="14" font-family="Inter, Arial">Sabtu: Tryout mini</text>
  <text x="852" y="280" fill="#E2E8F0" font-size="14" font-family="Inter, Arial">Minggu: Review salah</text>
</svg>
